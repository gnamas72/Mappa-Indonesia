<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Indonesia - Audio Guida</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #stop-global { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .etichetta-nome { background: white; border: 1px solid #333; font-weight: bold; padding: 2px 5px; }
        .gps-button { background-color: white; width: 44px; height: 44px; line-height: 44px; text-align: center; border-radius: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.4); cursor: pointer; font-size: 20px; display: block; }
    </style>
</head>
<body>

    <button id="stop-global" onclick="stopAudio()">🛑 STOP AUDIO</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function parla(testo) {
            window.speechSynthesis.cancel();
            const messaggio = new SpeechSynthesisUtterance(testo);
            messaggio.lang = 'it-IT';
            window.speechSynthesis.speak(messaggio);
        }

        function stopAudio() { window.speechSynthesis.cancel(); }

        // Caricamento CSV con delimitatore automatico o forzato a ";"
        Papa.parse('punti.csv', {
            download: true,
            header: true,
            delimiter: ";", 
            skipEmptyLines: true,
            complete: function(results) {
                const dati = results.data;
                const bounds = [];

                dati.forEach(riga => {
                    if (riga.Titolo && riga.Coordinate) {
                        const coord = riga.Coordinate.split(',').map(c => parseFloat(c.trim()));
                        
                        if (!isNaN(coord[0]) && !isNaN(coord[1])) {
                            const marker = L.marker(coord).addTo(map);
                            bounds.push(coord);

                            marker.bindTooltip(riga.Titolo, { permanent: true, direction: 'top', className: 'etichetta-nome', offset: [0, -10] });

                            const popupContent = `
                                <div style="min-width:200px">
                                    <strong>${riga.Titolo}</strong>
                                    <p style="font-size:13px">${riga.Descrizione.substring(0, 150)}...</p>
                                    <button style="background:#2ecc71; color:white; border:none; padding:10px; border-radius:5px; width:100%; cursor:pointer;" 
                                            onclick="parla('${riga.Descrizione.replace(/'/g, "\\'").replace(/\n/g, " ")}')">▶ ASCOLTA</button>
                                </div>`;
                            
                            marker.bindPopup(popupContent);
                        }
                    }
                });
                if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
            }
        });

        // Tasto GPS
        const gpsControl = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function() {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const button = L.DomUtil.create('a', 'gps-button', container);
                button.innerHTML = '🎯';
                button.onclick = function() { map.locate({setView: true, maxZoom: 16}); };
                return container;
            }
        });
        map.addControl(new gpsControl());
        map.on('locationfound', e => L.marker(e.latlng).addTo(map).bindPopup("Tu sei qui").openPopup());
    </script>
</body>
</html>
